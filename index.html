<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RG OS | Sistema Operativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-deep: #030303;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --neon-green: #39FF14;
            --neon-glow: rgba(57, 255, 20, 0.15);
            --text-main: #FFFFFF;
            --text-sec: #999999;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: var(--text-main); overflow-x: hidden; }

        /* PANTALLA DE LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: radial-gradient(circle at top right, #111 0%, var(--bg-deep) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; padding: 20px;
        }
        .login-glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 50px 30px; border-radius: 24px; width: 100%; max-width: 380px; border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.8); text-align: center; }
        .logo-ring { width: 80px; height: 80px; border-radius: 50%; border: 2px dashed var(--text-sec); margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center; font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; color: var(--text-main); position: relative; }
        .logo-ring::after { content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--neon-green); animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .login-glass p { color: var(--text-sec); font-size: 14px; margin-bottom: 35px; text-transform: uppercase; }
        .input-line { margin-bottom: 25px; position: relative; }
        .input-line i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-sec); }
        .input-line input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; color: #FFF; padding: 16px 15px 16px 45px; border-radius: 12px; font-size: 15px; outline: none; transition: 0.3s; }
        .input-line input:focus { border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-glow); }
        
        .btn-auth { width: 100%; background: var(--text-main); color: var(--bg-deep); padding: 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { background: var(--neon-green); box-shadow: 0 0 20px var(--neon-glow); }

        /* CONTENEDORES DE PANTALLAS */
        .screen { display: none; padding: 20px 20px 120px 20px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; margin-top: 10px; }
        .greeting h2 { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 400; color: var(--text-sec); margin-bottom: 2px;}
        .greeting h1 { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; }
        .greeting h1 span { color: var(--neon-green); }
        .profile-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center; color: var(--text-main); font-size: 18px; position: relative; cursor:pointer;}
        
        /* DASHBOARD */
        .quick-actions { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; scrollbar-width: none; }
        .quick-actions::-webkit-scrollbar { display: none; }
        .action-pill { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 12px 20px; border-radius: 30px; display: flex; align-items: center; gap: 10px; white-space: nowrap; font-size: 14px; font-weight: 600; transition: 0.3s; cursor:pointer;}
        .action-pill i { color: var(--neon-green); }
        .action-pill.primary { background: rgba(57, 255, 20, 0.1); border-color: var(--neon-green); color: var(--neon-green); }
        
        .finance-core { background: linear-gradient(135deg, rgba(20,20,20,0.8) 0%, rgba(10,10,10,0.9) 100%); border: 1px solid #333; border-top: 2px solid var(--neon-green); border-radius: 20px; padding: 30px 25px; margin-bottom: 30px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .finance-core p { color: var(--text-sec); font-size: 13px; text-transform: uppercase; margin-bottom: 5px; }
        .finance-core h3 { font-family: 'Rajdhani', sans-serif; font-size: 46px; font-weight: 700; }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .metric-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 20px; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; min-height: 130px; }
        .metric-card.large { grid-column: span 2; min-height: auto; flex-direction: row; align-items: center; }
        .metric-icon { width: 35px; height: 35px; border-radius: 10px; background: #1a1a1a; display: flex; justify-content: center; align-items: center; font-size: 16px; }
        .metric-icon.green { color: var(--neon-green); background: var(--neon-glow); }
        .metric-title { color: var(--text-sec); font-size: 13px; margin-top: 15px; }
        .metric-value { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; margin-top: 5px; }

        /* PANTALLA ALUMNOS */
        .search-bar { position: relative; margin-bottom: 25px; }
        .search-bar i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-sec); }
        .search-bar input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #FFF; padding: 15px 15px 15px 45px; border-radius: 30px; font-size: 15px; outline: none; }
        .search-bar input:focus { border-color: var(--neon-green); }

        .student-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; cursor: pointer; transition: 0.3s;}
        .student-card:active { transform: scale(0.98); border-color: var(--neon-green); }
        .student-info-group { display: flex; align-items: center; gap: 15px; }
        .student-avatar { width: 50px; height: 50px; border-radius: 50%; background: #222; border: 2px solid var(--neon-green); display: flex; justify-content: center; align-items: center; font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; text-transform: uppercase;}
        .student-details h3 { font-family: 'Inter', sans-serif; font-size: 16px; color: #FFF; margin-bottom: 3px; }
        .student-details p { font-size: 13px; color: var(--text-sec); }
        .student-action { color: var(--text-sec); font-size: 20px; padding: 10px; }

        .btn-primary { width: 100%; background: var(--neon-green); color: #000; padding: 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; cursor: pointer; transition: 0.3s;}
        .btn-primary:active { transform: scale(0.98); }

        /* MODAL AGREGAR ALUMNO */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: flex-end; }
        .modal-content { background: var(--bg-panel); width: 100%; max-width: 600px; padding: 30px 20px; border-radius: 24px 24px 0 0; border-top: 1px solid #333; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h3 { font-size: 20px; }
        .close-modal { background: #222; border: none; width: 35px; height: 35px; border-radius: 50%; color: #FFF; font-size: 16px; cursor: pointer; }

        /* NAVEGACIÓN INFERIOR */
        .floating-nav-wrapper { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .floating-nav { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.9); pointer-events: auto; }
        .nav-icon { color: var(--text-sec); font-size: 20px; padding: 12px 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-icon.active { color: var(--neon-green); }
        .nav-icon.active::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--neon-green); border-radius: 50%; }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen">
        <div class="login-glass">
            <div class="logo-ring">RG</div>
            <p>Acceso Seguro al Ecosistema</p>
            <div class="input-line">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Correo electrónico">
            </div>
            <div class="input-line">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Contraseña">
            </div>
            <button class="btn-auth" id="btnLogin" onclick="iniciarSesion()">Desbloquear Panel</button>
        </div>
    </div>

    <!-- DASHBOARD PRINCIPAL -->
    <div id="screen-dashboard" class="screen">
        <div class="app-header">
            <div class="greeting">
                <h2>Centro de Comando</h2>
                <h1>Coach <span>Rodolfo</span></h1>
            </div>
            <div class="profile-btn"><i class="fa-solid fa-bars-staggered"></i></div>
        </div>

        <div class="quick-actions">
            <div class="action-pill primary" onclick="navTo('screen-students')"><i class="fa-solid fa-user-plus"></i> Ingresar Alumno</div>
            <div class="action-pill"><i class="fa-solid fa-plus"></i> Nueva Rutina</div>
            <div class="action-pill"><i class="fa-solid fa-video"></i> Videoteca</div>
        </div>

        <div class="finance-core">
            <i class="fa-solid fa-wallet core-icon"></i>
            <p>Ingresos del Período</p>
            <h3>US$ 0,00</h3>
            <div class="trend"><i class="fa-solid fa-arrow-trend-up"></i> Sistema Activo</div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-header"><div class="metric-icon green"><i class="fa-solid fa-users"></i></div></div>
                <div><div class="metric-title">Alumnos Activos</div><div class="metric-value" id="dashboard-student-count">0</div></div>
            </div>
            <div class="metric-card">
                <div class="metric-header"><div class="metric-icon"><i class="fa-solid fa-microscope"></i></div></div>
                <div><div class="metric-title">Evaluaciones</div><div class="metric-value">0</div></div>
            </div>
        </div>
    </div>

    <!-- GESTOR DE ALUMNOS -->
    <div id="screen-students" class="screen">
        <div class="app-header">
            <div class="greeting">
                <h2>Base de Datos</h2>
                <h1>Mis <span>Alumnos</span></h1>
            </div>
            <div class="profile-btn" style="background: var(--neon-glow); color: var(--neon-green); border-color: var(--neon-green);">
                <i class="fa-solid fa-users"></i>
            </div>
        </div>

        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Buscar alumno por nombre...">
        </div>

        <!-- LISTA DE ALUMNOS CONECTADA A FIREBASE -->
        <div id="students-list">
            <p style="text-align:center; color:#555; margin-top:30px; font-size:14px;">Cargando base de datos...</p>
        </div>

        <button class="btn-primary" onclick="abrirModalAlumno()"><i class="fa-solid fa-plus"></i> Agregar Nuevo Alumno</button>
    </div>

    <!-- MODAL AGREGAR ALUMNO -->
    <div id="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Crear Perfil de Alumno</h3>
                <button class="close-modal" onclick="cerrarModalAlumno()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="input-line">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="new-student-name" placeholder="Nombre completo del alumno">
            </div>
            <div class="input-line">
                <i class="fa-brands fa-whatsapp"></i>
                <input type="number" id="new-student-phone" placeholder="Número de WhatsApp">
            </div>
            
            <button class="btn-primary" id="btn-save-student" onclick="guardarAlumno()">Guardar en Base de Datos</button>
        </div>
    </div>

    <!-- NAVEGACIÓN INFERIOR -->
    <div class="floating-nav-wrapper" id="bottom-nav" style="display: none;">
        <div class="floating-nav">
            <div class="nav-icon"><i class="fa-solid fa-dumbbell"></i></div>
            <div class="nav-icon" id="nav-btn-students" onclick="navTo('screen-students')"><i class="fa-solid fa-users"></i></div>
            <div class="nav-icon active" id="nav-btn-home" onclick="navTo('screen-dashboard')"><i class="fa-solid fa-house"></i></div>
            <div class="nav-icon"><i class="fa-solid fa-chart-line"></i></div>
        </div>
    </div>

    <!-- FIREBASE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // CONFIGURACIÓN EXACTA
        const firebaseConfig = {
          apiKey: "AIzaSyAy4lOulqCr8jHTiwpmn8YBP3ATNbP68d4",
          authDomain: "rg-coach-app.firebaseapp.com",
          projectId: "rg-coach-app",
          storageBucket: "rg-coach-app.firebasestorage.app",
          messagingSenderId: "836257101109",
          appId: "1:836257101109:web:e34f6578981d9ed632087c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // LOGIN
        window.iniciarSesion = function() {
            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;
            const btnAuth = document.getElementById('btnLogin');

            if(!emailInput || !passwordInput) return alert("⚠️ Ingresa correo y contraseña.");

            btnAuth.innerText = "VERIFICANDO..."; btnAuth.style.opacity = "0.5";

            signInWithEmailAndPassword(auth, emailInput, passwordInput)
                .then((userCredential) => {
                    const login = document.getElementById('login-screen');
                    login.style.opacity = '0';
                    setTimeout(() => {
                        login.style.display = 'none';
                        document.getElementById('screen-dashboard').style.display = 'block';
                        document.getElementById('bottom-nav').style.display = 'flex';
                        cargarAlumnosTiempoReal(); // Inicia la escucha a la BD
                    }, 500);
                })
                .catch((error) => {
                    alert("⛔ ACCESO DENEGADO");
                    btnAuth.innerText = "DESBLOQUEAR PANEL"; btnAuth.style.opacity = "1";
                });
        }

        // NAVEGACIÓN
        window.navTo = function(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(screenId).style.display = 'block';
            window.scrollTo(0,0);

            document.querySelectorAll('.nav-icon').forEach(icon => icon.classList.remove('active'));
            if(screenId === 'screen-dashboard') document.getElementById('nav-btn-home').classList.add('active');
            else if (screenId === 'screen-students') document.getElementById('nav-btn-students').classList.add('active');
        }

        // CONTROL DEL MODAL
        window.abrirModalAlumno = function() { document.getElementById('modal-overlay').style.display = 'flex'; }
        window.cerrarModalAlumno = function() { document.getElementById('modal-overlay').style.display = 'none'; }

        // GUARDAR ALUMNO EN FIREBASE
        window.guardarAlumno = async function() {
            const nombre = document.getElementById('new-student-name').value;
            const telefono = document.getElementById('new-student-phone').value;
            const btn = document.getElementById('btn-save-student');

            if(!nombre) return alert("El nombre del alumno es obligatorio.");

            btn.innerText = "Guardando..."; btn.style.opacity = "0.5";

            try {
                // Guarda en la colección "alumnos" en Google Firestore
                await addDoc(collection(db, "alumnos"), {
                    nombre: nombre,
                    telefono: telefono,
                    estado: "Activo",
                    fechaIngreso: serverTimestamp()
                });
                
                // Limpia y cierra
                document.getElementById('new-student-name').value = '';
                document.getElementById('new-student-phone').value = '';
                cerrarModalAlumno();
                btn.innerText = "Guardar en Base de Datos"; btn.style.opacity = "1";
                
            } catch (e) {
                alert("Error de conexión: " + e.message);
                btn.innerText = "Reintentar"; btn.style.opacity = "1";
            }
        }

        // CARGAR ALUMNOS EN TIEMPO REAL
        function cargarAlumnosTiempoReal() {
            const q = query(collection(db, "alumnos"), orderBy("fechaIngreso", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('students-list');
                list.innerHTML = ""; // Limpia la lista actual
                
                // Actualiza el contador del Dashboard
                document.getElementById('dashboard-student-count').innerText = snapshot.size;

                if(snapshot.empty) {
                    list.innerHTML = `<p style="text-align:center; color:#555; margin-top:30px;">Aún no tienes alumnos registrados.</p>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const inicial = data.nombre.charAt(0);
                    
                    list.innerHTML += `
                    <div class="student-card">
                        <div class="student-info-group">
                            <div class="student-avatar">${inicial}</div>
                            <div class="student-details">
                                <h3>${data.nombre}</h3>
                                <p>Ingreso Reciente • Activo</p>
                            </div>
                        </div>
                        <div class="student-action"><i class="fa-solid fa-chevron-right"></i></div>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
