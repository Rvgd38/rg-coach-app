<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RG OS | Sistema Operativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-deep: #030303;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --neon-green: #39FF14;
            --neon-glow: rgba(57, 255, 20, 0.15);
            --text-main: #FFFFFF;
            --text-sec: #999999;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: var(--text-main); overflow-x: hidden; }

        /* PANTALLA DE LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: radial-gradient(circle at top right, #111 0%, var(--bg-deep) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; padding: 20px;
        }
        .login-glass {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 50px 30px; border-radius: 24px; width: 100%; max-width: 380px;
            border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
        }
        .logo-ring {
            width: 80px; height: 80px; border-radius: 50%; border: 2px dashed var(--text-sec);
            margin: 0 auto 20px auto; display: flex; justify-content: center; align-items: center;
            font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; color: var(--text-main);
            position: relative;
        }
        .logo-ring::after {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%; border: 2px solid transparent; border-top-color: var(--neon-green);
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .login-glass p { color: var(--text-sec); font-size: 14px; margin-bottom: 35px; letter-spacing: 1px; text-transform: uppercase; }
        .input-line { margin-bottom: 25px; position: relative; }
        .input-line i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-sec); }
        .input-line input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; color: #FFF;
            padding: 16px 15px 16px 45px; border-radius: 12px; font-size: 15px; outline: none; transition: 0.3s;
        }
        .input-line input:focus { border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-glow); }
        
        .btn-auth {
            width: 100%; background: var(--text-main); color: var(--bg-deep); padding: 16px;
            border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-top: 10px;
        }
        .btn-auth:hover { background: var(--neon-green); box-shadow: 0 0 20px var(--neon-glow); }

        /* DASHBOARD PRINCIPAL */
        #app-screen { display: none; padding: 20px 20px 120px 20px; max-width: 600px; margin: 0 auto; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; margin-top: 10px; }
        .greeting h2 { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 400; color: var(--text-sec); margin-bottom: 2px;}
        .greeting h1 { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; }
        .greeting h1 span { color: var(--neon-green); }
        
        .profile-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center; color: var(--text-main); font-size: 18px; position: relative;}
        .profile-btn::after { content: ''; position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 8px var(--neon-green); }

        .quick-actions { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; scrollbar-width: none; }
        .quick-actions::-webkit-scrollbar { display: none; }
        .action-pill { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 12px 20px; border-radius: 30px; display: flex; align-items: center; gap: 10px; white-space: nowrap; font-size: 14px; font-weight: 600; color: var(--text-main); transition: 0.3s; }
        .action-pill i { color: var(--neon-green); }
        .action-pill.primary { background: rgba(57, 255, 20, 0.1); border-color: var(--neon-green); color: var(--neon-green); }

        .finance-core { background: linear-gradient(135deg, rgba(20,20,20,0.8) 0%, rgba(10,10,10,0.9) 100%); border: 1px solid #333; border-top: 2px solid var(--neon-green); border-radius: 20px; padding: 30px 25px; margin-bottom: 30px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .finance-core p { color: var(--text-sec); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .finance-core h3 { font-family: 'Rajdhani', sans-serif; font-size: 46px; font-weight: 700; letter-spacing: 1px; }
        .finance-core .trend { display: inline-flex; align-items: center; gap: 5px; background: var(--neon-glow); color: var(--neon-green); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 10px;}
        .core-icon { position: absolute; right: 25px; top: 35px; font-size: 40px; color: #222; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .metric-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 20px; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; min-height: 130px; transition: 0.3s; }
        .metric-card.large { grid-column: span 2; min-height: auto; flex-direction: row; align-items: center; }
        .metric-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .metric-icon { width: 35px; height: 35px; border-radius: 10px; background: #1a1a1a; display: flex; justify-content: center; align-items: center; font-size: 16px; }
        .metric-icon.green { color: var(--neon-green); background: var(--neon-glow); }
        .metric-title { color: var(--text-sec); font-size: 13px; margin-top: 15px; }
        .metric-value { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; line-height: 1; margin-top: 5px; }

        .floating-nav-wrapper { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .floating-nav { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.9); pointer-events: auto; }
        .nav-icon { color: var(--text-sec); font-size: 20px; padding: 12px 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .nav-icon.active { color: var(--neon-green); }
        .nav-icon.active::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--neon-green); border-radius: 50%; }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen">
        <div class="login-glass">
            <div class="logo-ring">RG</div>
            <p>Acceso Seguro al Ecosistema</p>
            
            <div class="input-line">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Correo electrónico">
            </div>
            <div class="input-line">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Contraseña">
            </div>
            
            <button class="btn-auth" onclick="iniciarSesion()">Desbloquear Panel</button>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL (RG OS DASHBOARD) -->
    <div id="app-screen">
        <div class="app-header">
            <div class="greeting">
                <h2>Centro de Comando</h2>
                <h1>Coach <span>Rodolfo</span></h1>
            </div>
            <div class="profile-btn"><i class="fa-solid fa-bars-staggered"></i></div>
        </div>

        <div class="quick-actions">
            <div class="action-pill primary"><i class="fa-solid fa-plus"></i> Nueva Rutina</div>
            <div class="action-pill"><i class="fa-solid fa-user-plus"></i> Ingresar Alumno</div>
            <div class="action-pill"><i class="fa-solid fa-apple-whole"></i> Crear Dieta</div>
            <div class="action-pill"><i class="fa-solid fa-video"></i> Videoteca</div>
        </div>

        <div class="finance-core">
            <i class="fa-solid fa-wallet core-icon"></i>
            <p>Ingresos del Período</p>
            <h3>US$ 0,00</h3>
            <div class="trend"><i class="fa-solid fa-arrow-trend-up"></i> Sistema Activo</div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-header"><div class="metric-icon green"><i class="fa-solid fa-users"></i></div></div>
                <div><div class="metric-title">Alumnos Activos</div><div class="metric-value">0</div></div>
            </div>
            <div class="metric-card">
                <div class="metric-header"><div class="metric-icon"><i class="fa-solid fa-microscope"></i></div></div>
                <div><div class="metric-title">Evaluaciones</div><div class="metric-value">0</div></div>
            </div>
            <div class="metric-card large">
                <div class="metric-icon" style="margin-right: 15px;"><i class="fa-solid fa-clipboard-check"></i></div>
                <div style="flex:1;">
                    <div class="metric-value" style="font-size: 22px;">Rutinas Asignadas</div>
                    <div class="metric-title" style="margin-top: 0;">Ningún plan pendiente de entrega</div>
                </div>
                <i class="fa-solid fa-chevron-right" style="color: #444;"></i>
            </div>
        </div>
    </div>

    <!-- PÍLDORA DE NAVEGACIÓN FLOTANTE -->
    <div class="floating-nav-wrapper" id="bottom-nav" style="display: none;">
        <div class="floating-nav">
            <div class="nav-icon"><i class="fa-solid fa-dumbbell"></i></div>
            <div class="nav-icon"><i class="fa-solid fa-users"></i></div>
            <div class="nav-icon active"><i class="fa-solid fa-house"></i></div>
            <div class="nav-icon"><i class="fa-solid fa-message"></i></div>
            <div class="nav-icon"><i class="fa-solid fa-chart-line"></i></div>
        </div>
    </div>

    <!-- CONEXIÓN AL BACKEND DE FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // Tus llaves maestras
        const firebaseConfig = {
          apiKey: "AIzaSyAy4lOulqCr8jHTiwpmn8YBP3ATNbP68d4",
          authDomain: "rg-coach-app.firebaseapp.com",
          projectId: "rg-coach-app",
          storageBucket: "rg-coach-app.firebasestorage.app",
          messagingSenderId: "836257101109",
          appId: "1:836257101109:web:e34f6578981d9ed632087c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Lógica real de seguridad
        window.iniciarSesion = function() {
            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;
            const btnAuth = document.querySelector('.btn-auth');

            if(!emailInput || !passwordInput) {
                alert("⚠️ Por favor ingresa tu correo y contraseña.");
                return;
            }

            btnAuth.innerText = "VERIFICANDO...";
            btnAuth.style.opacity = "0.5";

            signInWithEmailAndPassword(auth, emailInput, passwordInput)
                .then((userCredential) => {
                    // Acceso Concedido
                    const login = document.getElementById('login-screen');
                    login.style.opacity = '0';
                    login.style.transition = 'opacity 0.5s ease';
                    
                    setTimeout(() => {
                        login.style.display = 'none';
                        document.getElementById('app-screen').style.display = 'block';
                        document.getElementById('bottom-nav').style.display = 'flex';
                        window.scrollTo(0,0);
                    }, 500);
                })
                .catch((error) => {
                    // Acceso Denegado por el Servidor
                    alert("⛔ ACCESO DENEGADO: Usuario o contraseña incorrectos.");
                    btnAuth.innerText = "DESBLOQUEAR PANEL";
                    btnAuth.style.opacity = "1";
                });
        }
    </script>
</body>
</html>
